<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Admin | Pixel & Palette</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:240px;
    height:100vh;
    background:#080808;
    border-right:1px solid #333;
    padding:30px 20px;
}

.logo-box{
    text-align:center;
    margin-bottom:40px;
}

.logo-box img{
    width:100px;
    max-height:80px;
    object-fit:contain;
    margin-bottom:12px;
}

.logo-text{
    font-size:18px;
    font-weight:bold;
    letter-spacing:2px;
}

.menu a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:14px;
    margin-bottom:8px;
}

.menu a:hover{
    background:#111;
    border:1px solid #444;
}

.main{
    margin-left:240px;
    padding:40px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #333;
    padding-bottom:25px;
    margin-bottom:30px;
}

.badge{
    border:1px solid #fff;
    padding:10px 14px;
    font-size:12px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:18px;
    margin-bottom:35px;
}

.card{
    background:#0b0b0b;
    border:1px solid #333;
    padding:25px;
}

.card h3{
    color:#999;
    font-size:13px;
    margin-bottom:12px;
}

.card strong{
    font-size:28px;
}

.settings{
    max-width:800px;
    background:#080808;
    border:1px solid #333;
    padding:30px;
    margin-bottom:30px;
}

.settings h2{
    margin-bottom:25px;
}

.group{
    margin-bottom:18px;
}

label{
    display:block;
    color:#aaa;
    margin-bottom:7px;
}

input,textarea{
    width:100%;
    padding:13px;
    background:#000;
    color:#fff;
    border:1px solid #444;
}

textarea{
    height:100px;
    resize:vertical;
}

button{
    padding:13px 25px;
    background:#fff;
    color:#000;
    border:0;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#ccc;
}

#message{
    margin-top:18px;
}

@media(max-width:800px){

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
        border-right:0;
        border-bottom:1px solid #333;
    }

    .main{
        margin-left:0;
        padding:25px;
    }

    .cards{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:500px){

    .cards{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="logo-box">

        <img id="logoPreview" src="" alt="Logo">

        <div class="logo-text" id="sidebarCompany">
            PIXEL & PALETTE
        </div>

    </div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#settings">Website Details</a>
        <a href="#">Bookings</a>
        <a href="#">Clients</a>
        <a href="#">Team Members</a>
        <a href="#">Payments</a>
        <a href="#">Gallery</a>
        <a href="#">Invoices</a>
    </div>

</div>

<div class="main">

    <div class="topbar">
        <h1>Super Admin Dashboard</h1>
        <div class="badge">SUPER ADMIN</div>
    </div>

    <div class="cards">

        <div class="card">
            <h3>TOTAL BOOKINGS</h3>
            <strong>0</strong>
        </div>

        <div class="card">
            <h3>ACTIVE CLIENTS</h3>
            <strong>0</strong>
        </div>

        <div class="card">
            <h3>TEAM MEMBERS</h3>
            <strong>0</strong>
        </div>

        <div class="card">
            <h3>PENDING PAYMENTS</h3>
            <strong>₹0</strong>
        </div>

    </div>

    <div class="settings" id="settings">

        <h2>Website Details</h2>

        <div class="group">
            <label>Company Name</label>
            <input id="company" type="text">
        </div>

        <div class="group">
            <label>Phone Number</label>
            <input id="phone" type="text">
        </div>

        <div class="group">
            <label>Email Address</label>
            <input id="email" type="email">
        </div>

        <div class="group">
            <label>About Company</label>
            <textarea id="about"></textarea>
        </div>

        <div class="group">
            <label>Upload Company Logo</label>
            <input id="logoUpload" type="file" accept="image/*">
        </div>

        <button onclick="saveChanges()">
            SAVE CHANGES
        </button>

        <div id="message"></div>

    </div>

</div>

<script>

const company = document.getElementById("company");
const phone = document.getElementById("phone");
const email = document.getElementById("email");
const about = document.getElementById("about");
const logoUpload = document.getElementById("logoUpload");
const logoPreview = document.getElementById("logoPreview");
const sidebarCompany = document.getElementById("sidebarCompany");
const message = document.getElementById("message");

window.onload = function(){

    company.value = localStorage.getItem("company") || "Pixel & Palette";
    phone.value = localStorage.getItem("phone") || "";
    email.value = localStorage.getItem("email") || "";
    about.value = localStorage.getItem("about") || "";

    const savedLogo = localStorage.getItem("logo");

    if(savedLogo){
        logoPreview.src = savedLogo;
        logoPreview.style.display = "block";
    }else{
        logoPreview.style.display = "none";
    }

    sidebarCompany.innerText = company.value;

};

logoUpload.addEventListener("change", function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            logoPreview.src = e.target.result;
            logoPreview.style.display = "block";

            localStorage.setItem("logo", e.target.result);

        };

        reader.readAsDataURL(file);

    }

});

function saveChanges(){

    localStorage.setItem("company", company.value);
    localStorage.setItem("phone", phone.value);
    localStorage.setItem("email", email.value);
    localStorage.setItem("about", about.value);

    sidebarCompany.innerText = company.value;

    message.innerText = "✓ Changes saved successfully";

    setTimeout(function(){

        message.innerText = "";

    },3000);

}

</script>

</body>
</html>
