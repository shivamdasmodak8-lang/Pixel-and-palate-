<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel & Palette</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    background: #000000;
    color: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
}

/* HEADER */

header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    padding: 22px 8%;
    background: #000000;
    border-bottom: 1px solid #333333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
}

.logo {
    color: #ffffff;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 2px;
}

nav a {
    color: #ffffff;
    text-decoration: none;
    margin-left: 25px;
    font-size: 14px;
}

nav a:hover {
    color: #aaaaaa;
}

/* HERO */

.hero {
    min-height: 100vh;
    padding: 150px 20px 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #000000;
}

.hero h1 {
    color: #ffffff;
    font-size: clamp(42px, 8vw, 90px);
    letter-spacing: 3px;
    margin-bottom: 25px;
}

.hero p {
    color: #dddddd;
    font-size: 18px;
    margin-bottom: 35px;
}

.button {
    display: inline-block;
    color: #ffffff;
    border: 1px solid #ffffff;
    padding: 14px 30px;
    text-decoration: none;
    transition: 0.3s;
}

.button:hover {
    background: #ffffff;
    color: #000000;
}
